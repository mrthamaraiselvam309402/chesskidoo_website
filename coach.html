<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChessKidoo – Coach Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link rel="stylesheet" href="assets/css/dashboard.css"/>
  <!-- Chart.js for the rating graph -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Guard – only coach role allowed -->
  <script src="assets/js/auth.js"></script>
  <script>if (!Auth.guard('coach')) document.write('Redirecting…');</script>

  <div class="dashboard">
    <!-- Sidebar -->
    <nav class="sidebar">
      <h3 style="margin-bottom:24px; color:#fff;">ChessKidoo</h3>
      <a href="coach.html" class="active">🏠 Home</a>
      <a href="#progress">📈 Progress</a>
      <a href="#schedule">📅 Schedule</a>
      <a href="#games">♟ Game Review</a>
      <a href="#" id="coachLogout">🚪 Log out</a>
    </nav>

    <!-- Main -->
    <main class="main">
      <section class="card">
        <h3>Hello, <span id="coachName"></span>! 🎉</h3>
        <p>Here’s a snapshot of your coaching journey.</p>

        <div class="grid-wrap" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:24px; margin-top:24px;">
          <div class="card"><h4>Specialty</h4><p id="currSpecialty" class="stat-num"></p></div>
          <div class="card"><h4>FIDE Rating</h4><p id="currRating" class="stat-num"></p></div>
          <div class="card"><h4>Students Coached</h4><p id="studentCount"></p></div>
          <div class="card"><h4>Upcoming Classes</h4><p id="nextClass"></p></div>
        </div>
      </section>

      <!-- Coach stats chart -->
      <section id="progress" class="card">
        <h3>Coaching Impact</h3>
        <div class="chart-wrapper"><canvas id="coachChart"></canvas></div>
      </section>

      <!-- Schedule -->
      <section id="schedule" class="card">
        <h3>My Schedule</h3>
        <table class="table" id="scheduleTable">
          <thead><tr><th>#</th><th>Title</th><th>Day / Time</th><th>Student Level</th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <!-- Game review videos -->
      <section id="games" class="card">
        <h3>Game Review Videos</h3>
        <ul id="gameList"></ul>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Scripts -->
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/coach.js"></script>
  <script>
    const cur = Auth.currentUser();
    if (cur) document.getElementById('coachName').textContent = cur.name;
    document.getElementById('coachLogout').addEventListener('click', e => {
      e.preventDefault(); Auth.logout();
    });
  </script>
</body>
</html>
